<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0e7c66" />
    <meta
      name="description"
      content="Drop in one script tag and your visitors get a private voice and text AI agent that runs entirely in their browser. No backend, no API keys, no per-message cost. Open source."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="aidekin" />
    <meta property="og:title" content="aidekin: your own on-device voice and text agent" />
    <meta
      property="og:description"
      content="One script tag gives your visitors a private voice and text AI agent that runs entirely in their browser. No backend, no API keys, no per-message cost."
    />
    <meta property="og:url" content="https://aidekin.com" />
    <meta property="og:image" content="https://aidekin.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="aidekin: on-device voice and text agent" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="aidekin: your own on-device voice and text agent" />
    <meta
      name="twitter:description"
      content="A private voice and text AI agent that runs entirely in the browser. No backend, no API keys, no per-message cost."
    />
    <meta name="twitter:image" content="https://aidekin.com/og.png" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-render-blocking (media=print → all on load) so first paint isn't gated on the
         Google Fonts round-trip; system-font fallback shows instantly, then swaps. -->
    <link
      rel="stylesheet"
      crossorigin
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <noscript>
      <link
        rel="stylesheet"
        crossorigin
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>
    <title>aidekin: your own on-device voice and text agent</title>
    <script>
      // Apply the saved/system theme before paint to avoid a flash.
      try {
        const t = localStorage.getItem('aidekin-theme')
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
