<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0e7c66" />
    <meta
      name="description"
      content="Drop in one script tag and your visitors get a private voice and text AI agent that runs entirely in their browser. No backend, no API keys, no per-message cost. Open source."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="aidekin" />
    <meta property="og:title" content="aidekin: your own on-device voice and text agent" />
    <meta
      property="og:description"
      content="One script tag gives your visitors a private voice and text AI agent that runs entirely in their browser. No backend, no API keys, no per-message cost."
    />
    <meta property="og:url" content="https://aidekin.com" />
    <meta property="og:image" content="https://aidekin.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="aidekin: on-device voice and text agent" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="aidekin: your own on-device voice and text agent" />
    <meta
      name="twitter:description"
      content="A private voice and text AI agent that runs entirely in the browser. No backend, no API keys, no per-message cost."
    />
    <meta name="twitter:image" content="https://aidekin.com/og.png" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-render-blocking (media=print → all on load) so first paint isn't gated on the
         Google Fonts round-trip; system-font fallback shows instantly, then swaps. -->
    <link
      rel="stylesheet"
      crossorigin
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <noscript>
      <link
        rel="stylesheet"
        crossorigin
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>
    <title>aidekin: your own on-device voice and text agent</title>
    <script>
      // Apply the saved/system theme before paint to avoid a flash.
      try {
        const t = localStorage.getItem('aidekin-theme')
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        }
      } catch (_) {}
    </script>
    <!-- FAQ rich-result data. Keep in sync with the landing page's questions section. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is it really free?",
            "acceptedAnswer": { "@type": "Answer", "text": "The widget is open source (MIT) and the hosted snippet runs on a free static host. The model streams once from a public CDN and caches in the visitor's browser. There are no per-message charges." }
          },
          {
            "@type": "Question",
            "name": "What does the visitor download?",
            "acceptedAnswer": { "@type": "Answer", "text": "About 290 MB for text chat (the language model), once, then cached. Turning on voice adds its speech models (about 1.6 GB) the first time it is used, also cached. After that it works offline." }
          },
          {
            "@type": "Question",
            "name": "Where does my data go?",
            "acceptedAnswer": { "@type": "Answer", "text": "Nowhere. Inference and retrieval happen entirely in the visitor's browser. The knowledge file is downloaded by visitors, so treat it as public and never put secrets in it." }
          },
          {
            "@type": "Question",
            "name": "Can I use my own content?",
            "acceptedAnswer": { "@type": "Answer", "text": "Yes. Build a knowledge file in your browser or via the CLI, host the small file anywhere, and point the widget at it. Answers get grounded in your content." }
          },
          {
            "@type": "Question",
            "name": "Which devices does it work on?",
            "acceptedAnswer": { "@type": "Answer", "text": "Recent desktop Chrome, Edge, Safari 26+, and Firefox 145+, plus current phones. Devices that cannot run it get a friendly notice instead of a crash." }
          },
          {
            "@type": "Question",
            "name": "Is a model this small actually useful?",
            "acceptedAnswer": { "@type": "Answer", "text": "It is a 1.7-billion-parameter model: closer to a sharp product specialist than a general genius. Grounded in a knowledge file it answers product questions precisely and admits what it does not know." }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
