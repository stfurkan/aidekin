name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run lint
      # The engine now lives at github.com/stfurkan/bitgpu (own CI) and is consumed
      # as a pinned npm dependency. Root build = typecheck + site/widget + loader bundles.
      - run: npm run build
