<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Pre-paint theme: set the dark class BEFORE first paint so the iframe never flashes a
         white background while the JS bundle loads. Mirrors the logic in widget/main.tsx
         (visitor's stored choice wins, else the owner's data-theme, else OS). Kept tiny and
         defensive - localStorage may be partitioned in a third-party iframe. -->
    <script>
      (function () {
        try {
          var stored = null
          try {
            stored = localStorage.getItem('aidekin:widget-theme')
          } catch (e) {}
          var dark
          if (stored) {
            dark = stored === 'dark'
          } else {
            var theme = 'auto'
            try {
              var raw = location.hash.slice(1)
              if (raw) {
                var c = JSON.parse(decodeURIComponent(raw))
                if (c && c.theme) theme = c.theme
              }
            } catch (e) {}
            dark = theme === 'dark' || (theme !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches)
          }
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>

    <style>
      html {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      /* Match the app's --background exactly so there is no second flash when React paints. */
      body {
        background: #fbfbf9;
      }
      html.dark body {
        background: #0b0c0e;
      }
      #root {
        height: 100%;
      }

      /* Branded loading state, shown the instant the shell paints and replaced when React
         mounts (createRoot clears #root). Feels identical to the app's own probe spinner,
         so there is no visual jump. */
      .aidekin-boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }
      .aidekin-boot svg {
        width: 34px;
        height: 34px;
        color: #5b6068;
        animation: aidekin-pulse 1.6s ease-in-out infinite;
      }
      html.dark .aidekin-boot svg {
        color: #9aa0a8;
      }
      .aidekin-boot i {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2.5px solid rgba(130, 130, 140, 0.22);
        border-top-color: #29a383;
        animation: aidekin-spin 0.8s linear infinite;
      }
      @keyframes aidekin-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes aidekin-pulse {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .aidekin-boot svg,
        .aidekin-boot i {
          animation: none;
        }
      }
    </style>

    <!-- Fonts load NON-render-blocking (media=print → all on load), so the themed shell +
         spinner paint immediately instead of waiting on a Google Fonts round-trip. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      crossorigin
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <noscript>
      <link
        rel="stylesheet"
        crossorigin
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>

    <title>aidekin widget</title>
  </head>
  <body>
    <div id="root">
      <div class="aidekin-boot" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path
            d="M8 4 H6 a2 2 0 0 0 -2 2 V18 a2 2 0 0 0 2 2 H8"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M16 4 H18 a2 2 0 0 1 2 2 V18 a2 2 0 0 1 -2 2 H16"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle cx="12" cy="12" r="3" fill="#29a383" />
        </svg>
        <i></i>
      </div>
    </div>
    <script type="module" src="/src/widget/main.tsx"></script>
  </body>
</html>
