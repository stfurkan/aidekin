<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bonsai WebGPU kernel tests</title>
  <style>
    body { font: 14px/1.5 ui-monospace, monospace; max-width: 900px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 18px; }
    button { font: inherit; padding: 8px 14px; cursor: pointer; }
    pre { background: #f4f4f5; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
    .pass { color: #166534; font-weight: 700; }
    .fail { color: #b91c1c; font-weight: 700; }
  </style>
</head>
<body>
  <h1>Bonsai WebGPU kernel tests</h1>
  <p>Serve this folder (<code>python3 -m http.server</code>) and open in Chrome. Needs WebGPU.</p>
  <button id="run">Run all kernel tests</button>
  <pre id="out">idle.</pre>

  <script type="module">
    const out = document.getElementById('out');
    const log = (s) => { out.textContent += s + '\n'; };

    // u = u32 field, f = f32 field. Order must match each kernel's Params struct (padded to 16 bytes).
    const TESTS = [
      { name: 'binary_matmul', wgsl: 'matmul_binary.wgsl',
        params: p => [['u', p.M], ['u', p.N], ['u', p.K], ['u', p.nb], ['u', p.block], ['u', 0]],
        inputs: [['x', 'f32'], ['signbits', 'u32'], ['scales', 'f32']],
        outElems: p => p.M * p.N, threads: p => p.M * p.N },
      { name: 'rmsnorm', wgsl: 'rmsnorm.wgsl',
        params: p => [['u', p.R], ['u', p.D], ['f', p.eps], ['u', 0]],
        inputs: [['x', 'f32'], ['gamma', 'f32']],
        outElems: p => p.R * p.D, threads: p => p.R },
      { name: 'rope', wgsl: 'rope.wgsl',
        params: p => [['u', p.S], ['u', p.H], ['u', p.D], ['u', 0]],
        inputs: [['x', 'f32'], ['cos', 'f32'], ['sin', 'f32']],
        outElems: p => p.S * p.H * p.D, threads: p => p.S * p.H * p.D },
      { name: 'swiglu', wgsl: 'swiglu.wgsl',
        params: p => [['u', p.n], ['u', 0], ['u', 0], ['u', 0]],
        inputs: [['gate', 'f32'], ['up', 'f32']],
        outElems: p => p.n, threads: p => p.n },
      { name: 'attention', wgsl: 'attention.wgsl',
        params: p => [['u', p.S], ['u', p.H], ['u', p.D], ['u', 0]],
        inputs: [['q', 'f32'], ['k', 'f32'], ['v', 'f32']],
        outElems: p => p.S * p.H * p.D, threads: p => p.S * p.H },
    ];

    const buf = async (url) => (await (await fetch(url)).arrayBuffer());

    function makeUniform(fields) {
      const ab = new ArrayBuffer(Math.ceil(fields.length / 4) * 16);
      const dv = new DataView(ab);
      fields.forEach(([t, v], i) => t === 'f' ? dv.setFloat32(i * 4, v, true) : dv.setUint32(i * 4, v >>> 0, true));
      return ab;
    }

    async function runTest(device, t) {
      const p = await (await fetch(`./fixtures/${t.name}/params.json`)).json();
      const S = GPUBufferUsage.STORAGE, CD = GPUBufferUsage.COPY_DST, CS = GPUBufferUsage.COPY_SRC;
      const mk = (data, usage) => { const b = device.createBuffer({ size: data.byteLength, usage }); device.queue.writeBuffer(b, 0, data); return b; };

      const entries = [{ binding: 0, resource: { buffer: mk(makeUniform(t.params(p)), GPUBufferUsage.UNIFORM | CD) } }];
      let b = 1;
      for (const [name] of t.inputs) {
        entries.push({ binding: b++, resource: { buffer: mk(await buf(`./fixtures/${t.name}/${name}.bin`), S | CD) } });
      }
      const outBytes = t.outElems(p) * 4;
      const yBuf = device.createBuffer({ size: outBytes, usage: S | CS });
      entries.push({ binding: b, resource: { buffer: yBuf } });
      const readBuf = device.createBuffer({ size: outBytes, usage: GPUBufferUsage.MAP_READ | CD });

      const mod = device.createShaderModule({ code: await (await fetch(`./${t.wgsl}`)).text() });
      const pipe = device.createComputePipeline({ layout: 'auto', compute: { module: mod, entryPoint: 'main' } });
      const enc = device.createCommandEncoder();
      const pass = enc.beginComputePass();
      pass.setPipeline(pipe);
      pass.setBindGroup(0, device.createBindGroup({ layout: pipe.getBindGroupLayout(0), entries }));
      pass.dispatchWorkgroups(Math.ceil(t.threads(p) / 64));
      pass.end();
      enc.copyBufferToBuffer(yBuf, 0, readBuf, 0, outBytes);
      const t0 = performance.now();
      device.queue.submit([enc.finish()]);
      await device.queue.onSubmittedWorkDone();
      const ms = performance.now() - t0;

      await readBuf.mapAsync(GPUMapMode.READ);
      const y = new Float32Array(readBuf.getMappedRange().slice(0));
      readBuf.unmap();
      const exp = new Float32Array(await buf(`./fixtures/${t.name}/expected.bin`));

      let dot = 0, na = 0, nb = 0, maxAbs = 0;
      for (let i = 0; i < y.length; i++) { dot += y[i] * exp[i]; na += y[i] * y[i]; nb += exp[i] * exp[i]; maxAbs = Math.max(maxAbs, Math.abs(y[i] - exp[i])); }
      const cos = dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-9);
      const ok = cos > 0.9999;
      log(`${ok ? '[PASS]' : '[FAIL]'} ${t.name.padEnd(14)} cosine=${cos.toFixed(7)} maxabs=${maxAbs.toExponential(2)} (${ms.toFixed(1)} ms)`);
      return ok;
    }

    async function runAll() {
      out.textContent = '';
      if (!navigator.gpu) { log('WebGPU not available.'); return; }
      const adapter = await navigator.gpu.requestAdapter();
      const device = await adapter.requestDevice();
      log('adapter: ' + JSON.stringify(adapter.info ?? {}) + '\n');
      let allOk = true;
      for (const t of TESTS) {
        try { allOk = (await runTest(device, t)) && allOk; }
        catch (e) { log(`[ERROR] ${t.name}: ${e.message}`); allOk = false; }
      }
      out.insertAdjacentHTML('beforeend', `\n<span class="${allOk ? 'pass' : 'fail'}">${allOk ? 'ALL PASS' : 'SOME FAILED'}</span>`);
    }

    document.getElementById('run').onclick = () => runAll().catch(e => log('ERROR: ' + e.message));
  </script>
</body>
</html>
