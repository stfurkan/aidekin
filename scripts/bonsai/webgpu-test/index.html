<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bonsai WebGPU kernel tests</title>
  <style>
    body { font: 14px/1.5 ui-monospace, monospace; max-width: 820px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 18px; }
    button { font: inherit; padding: 8px 14px; cursor: pointer; }
    pre { background: #f4f4f5; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
    .pass { color: #166534; font-weight: 700; }
    .fail { color: #b91c1c; font-weight: 700; }
  </style>
</head>
<body>
  <h1>Bonsai WebGPU kernel tests</h1>
  <p>Serve this folder (<code>python3 -m http.server</code>) and open it in Chrome. Needs WebGPU.</p>
  <button id="run">Run binary-matmul test</button>
  <pre id="out">idle.</pre>

  <script type="module">
    const out = document.getElementById('out');
    const log = (s) => { out.textContent += s + '\n'; };

    async function fetchBuf(url) { return new Uint8Array(await (await fetch(url)).arrayBuffer()).buffer; }

    async function runBinaryMatmul() {
      out.textContent = '';
      if (!navigator.gpu) { log('WebGPU not available in this browser.'); return; }
      const adapter = await navigator.gpu.requestAdapter();
      const device = await adapter.requestDevice();
      log('adapter: ' + JSON.stringify(adapter.info ?? {}));

      const fx = await (await fetch('./fixtures/fixture.json')).json();
      log(`fixture: ${fx.tensor}  M=${fx.M} N=${fx.N} K=${fx.K} nb=${fx.nb}`);
      const x = new Float32Array(await fetchBuf('./fixtures/x.f32.bin'));
      const signbits = new Uint32Array(await fetchBuf('./fixtures/signbits.u32.bin'));
      const scales = new Float32Array(await fetchBuf('./fixtures/scales.f32.bin'));
      const expected = new Float32Array(await fetchBuf('./fixtures/expected.f32.bin'));
      const wgsl = await (await fetch('./matmul_binary.wgsl')).text();

      const mk = (data, usage) => {
        const b = device.createBuffer({ size: data.byteLength, usage });
        device.queue.writeBuffer(b, 0, data);
        return b;
      };
      const S = GPUBufferUsage.STORAGE, CD = GPUBufferUsage.COPY_DST, CS = GPUBufferUsage.COPY_SRC;
      const params = new Uint32Array([fx.M, fx.N, fx.K, fx.nb, fx.block, 0]);
      const pBuf = mk(params, GPUBufferUsage.UNIFORM | CD);
      const xBuf = mk(x, S | CD);
      const wBuf = mk(signbits, S | CD);
      const sBuf = mk(scales, S | CD);
      const yBytes = fx.M * fx.N * 4;
      const yBuf = device.createBuffer({ size: yBytes, usage: S | CS });
      const readBuf = device.createBuffer({ size: yBytes, usage: GPUBufferUsage.MAP_READ | CD });

      const mod = device.createShaderModule({ code: wgsl });
      const pipeline = device.createComputePipeline({ layout: 'auto', compute: { module: mod, entryPoint: 'main' } });
      const bind = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: pBuf } },
          { binding: 1, resource: { buffer: xBuf } },
          { binding: 2, resource: { buffer: wBuf } },
          { binding: 3, resource: { buffer: sBuf } },
          { binding: 4, resource: { buffer: yBuf } },
        ],
      });

      const enc = device.createCommandEncoder();
      const pass = enc.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bind);
      pass.dispatchWorkgroups(Math.ceil((fx.M * fx.N) / 64));
      pass.end();
      enc.copyBufferToBuffer(yBuf, 0, readBuf, 0, yBytes);
      const t0 = performance.now();
      device.queue.submit([enc.finish()]);
      await device.queue.onSubmittedWorkDone();
      const ms = performance.now() - t0;

      await readBuf.mapAsync(GPUMapMode.READ);
      const y = new Float32Array(readBuf.getMappedRange().slice(0));
      readBuf.unmap();

      let dot = 0, na = 0, nb = 0, maxAbs = 0;
      for (let i = 0; i < y.length; i++) {
        dot += y[i] * expected[i]; na += y[i] * y[i]; nb += expected[i] * expected[i];
        maxAbs = Math.max(maxAbs, Math.abs(y[i] - expected[i]));
      }
      const cos = dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-9);
      log(`gpu y[0,:4] = [${Array.from(y.slice(0, 4)).map(v => v.toFixed(4))}]`);
      log(`ref   [0,:4] = [${Array.from(expected.slice(0, 4)).map(v => v.toFixed(4))}]`);
      log(`cosine = ${cos.toFixed(7)}   max abs diff = ${maxAbs.toFixed(5)}   (${ms.toFixed(1)} ms)`);
      const ok = cos > 0.9999;
      log((ok ? '[PASS]' : '[FAIL]') + ' binary-matmul kernel');
      out.insertAdjacentHTML('beforeend', `<span class="${ok ? 'pass' : 'fail'}">${ok ? 'PASS' : 'FAIL'}</span>`);
    }

    document.getElementById('run').onclick = () => runBinaryMatmul().catch(e => log('ERROR: ' + e.message));
  </script>
</body>
</html>
